<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>메인페이지</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --bg: #FAFAF7;
    --ink: #1F2E22;
    --muted: #767065;
    --line: #E6E1D6;
    --accent: #E8622C;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
    display:flex;
    flex-direction: column;
  }
  a{ text-decoration:none; color:inherit; }
  button{ font-family: inherit; }

  .notice-bar{
    width: 100%;
    background: var(--ink);
    color: #fff;
    overflow: hidden;
    white-space: nowrap;
    padding: 11px 0;
    flex: 0 0 auto;
  }
  .notice-track{
    display: inline-block;
    padding-left: 100%;
    font-size: 14px;
    font-weight: 700;
    animation: marquee 22s linear infinite;
  }
  @keyframes marquee{
    from{ transform: translateX(0); }
    to{ transform: translateX(-100%); }
  }
  @media (prefers-reduced-motion: reduce){
    .notice-track{ animation: none; padding-left: 16px; }
  }

  .hero-wrap{
    flex: 1;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .hero{
    width: 100%;
    max-width: 480px;
    padding: 32px 24px 40px;
  }
  .eyebrow{
    margin: 0 0 6px;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  h1{
    margin: 0 0 10px;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.25;
  }
  .desc{
    margin: 0 0 26px;
    font-size: 16px;
    color: var(--muted);
    font-weight: 500;
    line-height: 1.5;
  }

  .search-wrap{
    position: relative;
    margin-bottom: 14px;
  }
  .search-wrap input{
    width: 100%;
    padding: 16px 18px 16px 46px;
    font-size: 17px;
    font-weight: 600;
    border-radius: 14px;
    border: 2px solid var(--line);
    background: #fff;
    color: var(--ink);
    outline: none;
  }
  .search-wrap input:focus{ border-color: var(--accent); }
  .search-wrap input::placeholder{ color: #B3AC9E; font-weight: 500; }
  .search-icon{
    position:absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    opacity: 0.6;
  }

  .cta-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 8px;
    width: 100%;
    padding: 16px 0;
    background: var(--accent);
    color: #fff;
    font-size: 17px;
    font-weight: 800;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    margin-bottom: 22px;
  }
  .cta-btn:active{ transform: scale(0.98); }

  .quick-label{
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    margin: 0 0 10px;
  }
  .quick-cats{
    display:flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .quick-chip{
    padding: 10px 16px;
    border-radius: 999px;
    border: 2px solid var(--line);
    background: #fff;
    color: var(--ink);
    font-size: 14px;
    font-weight: 700;
  }
  .quick-chip:active{ transform: scale(0.96); }
</style>
</head>
<body>

<div class="notice-bar">
  <span class="notice-track" id="noticeTrack"></span>
</div>

<div class="hero-wrap">
<div class="hero">
  <p class="eyebrow">환영합니다</p>
  <h1>오늘의 시식 코너를<br/>만나보세요</h1>
  <p class="desc">궁금한 제품을 검색하거나, 전체 목록에서 둘러보세요</p>

  <form id="searchForm" class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="제품 이름으로 검색" />
  </form>

  <button id="goAllBtn" class="cta-btn" type="button">전체 시식가이드 보기 →</button>

  <p class="quick-label">카테고리로 바로가기</p>
  <div class="quick-cats" id="quickCats"></div>
</div>
</div>

<script>
/* ============================================================
   ⚙️ 설정

   1) TASTING_GUIDE_URL
      - 시식가이드 목록 페이지 파일 이름/경로를 적어주세요.
      - 실제 서버에 올리셨을 때 파일명이 다르면 여기만 바꾸면 됩니다.

   2) CATEGORIES
      - 시식가이드 페이지(tasting-guide.html)의 CATEGORIES 배열과
        똑같은 목록으로 맞춰주세요. 카테고리 바로가기 칩이 만들어집니다.
============================================================ */

const TASTING_GUIDE_URL = 'tasting-guide.html';
const CATEGORIES = ['라면류', '스낵류', '음료류', '간편식', '건강식품'];

// 📢 상단에 흘러가는 공지 배너 문구 - 여러 개 넣으면 순서대로 이어서 흘러갑니다.
const NOTICES = [
  '이번 주 신제품 시식 이벤트 진행중입니다',
  '알림장은 매주 금요일 업데이트됩니다',
];

// ------------------------------------------------------------
// 아래부터는 화면을 동작시키는 코드입니다. (수정하지 않아도 됩니다)
// ------------------------------------------------------------

const searchForm = document.getElementById('searchForm');
const searchInput = document.getElementById('searchInput');
const quickCats = document.getElementById('quickCats');
const noticeTrack = document.getElementById('noticeTrack');

noticeTrack.textContent = '📢 ' + NOTICES.join('     •     ');

function goToGuide(query){
  const url = new URL(TASTING_GUIDE_URL, window.location.href);
  if(query) url.searchParams.set('q', query);
  window.location.href = url.toString();
}

searchForm.addEventListener('submit', (e) => {
  e.preventDefault();
  goToGuide(searchInput.value.trim());
});

document.getElementById('goAllBtn').addEventListener('click', () => {
  goToGuide('');
});

quickCats.innerHTML = CATEGORIES.map(cat => {
  const url = new URL(TASTING_GUIDE_URL, window.location.href);
  url.searchParams.set('cat', cat);
  return `<a class="quick-chip" href="${url.toString()}">${cat}</a>`;
}).join('');
</script>

</body>
</html>
